name: Auto Release TaskOrganizer

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
  schedule:
    - cron: '0 0 * * *'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'schedule' && 'develop' || github.ref }}

      - id: get_version
        run: |
          VERSION=$(jq -r .version custom_components/task_organizer/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - id: release_info
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TYPE=stable" >> $GITHUB_ENV
            echo "TAG=v${VERSION}" >> $GITHUB_ENV
            echo "TITLE=TaskOrganizerV${VERSION}" >> $GITHUB_ENV
            echo "PRERELEASE=false" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "TYPE=beta" >> $GITHUB_ENV
            echo "TAG=v${VERSION}-beta" >> $GITHUB_ENV
            echo "TITLE=TaskOrganizerV${VERSION}-beta" >> $GITHUB_ENV
            echo "PRERELEASE=true" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/develop" || "${{ github.event_name }}" == "schedule" ]]; then
            LATEST_NIGHTLY=$(git tag -l "nightly-*" | sort -r | head -n 1)
            CHANGES=$(if [ -n "$LATEST_NIGHTLY" ]; then git log $LATEST_NIGHTLY..HEAD --oneline; else echo "initial_run"; fi)

            if [ -z "$CHANGES" ]; then
              echo "ℹ️ No changes since last nightly ($LATEST_NIGHTLY). Skip release."
              echo "TYPE=unknown" >> $GITHUB_ENV
            else
              echo "TYPE=nightly" >> $GITHUB_ENV
              echo "TAG=nightly-$(date +'%Y%m%d')" >> $GITHUB_ENV
              echo "TITLE=TaskOrganizer-nightly-$(date +'%Y%m%d')" >> $GITHUB_ENV
              echo "PRERELEASE=true" >> $GITHUB_ENV
            fi
          else
            echo "TYPE=unknown" >> $GITHUB_ENV
          fi

      - if: env.TYPE == 'beta'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "ℹ️ Beta release ${TAG} exists. Deleting to recreate and update."
            gh release delete "${TAG}" --cleanup-tag -y || true
            git push --delete origin "${TAG}" || true
          fi

      - if: env.TYPE == 'nightly'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # First, delete today's nightly if it exists, to allow for updates on new pushes.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "ℹ️ Nightly release ${TAG} exists. Deleting to recreate and update."
            gh release delete "${TAG}" --cleanup-tag -y || true
            # The local tag is deleted by gh. We also need to delete the remote tag.
            git push --delete origin "${TAG}" || true
          fi

          git tag -l "nightly-*" | sort -r > nightly_tags.txt
          COUNT=$(wc -l < nightly_tags.txt)
          if [ "$COUNT" -ge 8 ]; then
            tail -n +8 nightly_tags.txt > tags_to_delete.txt
            while read -r tag_to_delete; do
              gh release delete "$tag_to_delete" --cleanup-tag -y || true
              git push --delete origin "$tag_to_delete" || true
            done < tags_to_delete.txt
          fi

      - name: Get Changelog Body
        if: env.TYPE == 'stable' || env.TYPE == 'beta'
        run: |
          CHANGELOG_CONTENT=$(awk -v version="$VERSION" '
            BEGIN { p = 0 }
            $0 ~ "^## \\[" version "\\]" { p = 1; next }
            $0 ~ "^## \\[" { if (p == 1) exit }
            p { print }
          ' CHANGELOG.md)

          echo "CHANGELOG_BODY<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - if: env.TYPE != 'unknown'
        name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ env.CHANGELOG_BODY }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "ℹ️ Release ${TAG} already exists. No new release needed. Skipping creation..."
            exit 0
          fi

          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TARGET_REF="${{ github.ref_name }}"
          if [[ "$TYPE" == "nightly" ]]; then
            TARGET_REF="develop"
          fi

          if [[ "$TYPE" == "stable" || "$TYPE" == "beta" ]]; then
            gh release create "${TAG}" -t "${TITLE}" --notes "${CHANGELOG}" ${PRERELEASE_FLAG} --target "${TARGET_REF}"
          else
            gh release create "${TAG}" -t "${TITLE}" --generate-notes ${PRERELEASE_FLAG} --target "${TARGET_REF}"
          fi
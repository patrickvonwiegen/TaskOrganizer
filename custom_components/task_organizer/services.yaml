reset_monthly_points:
  name: Reset monthly points
  description: Manually resets all roommate points to 0 and archives the month.
  
complete_task_by_name:
  name: Complete task
  description: Marks a task as completed by its exact name.
  fields:
    task_name:
      name: Task name
      description: The exact name of the task (e.g., "Take out the trash").
      required: true
      example: "Take out the trash"
      selector:
        text:
    user_id:
      name: User (Optional)
      description: The HA User-ID or a person.name entity. If left empty, the executing user gets the points.
      required: false
      selector:
        text:

add_task:
  name: Add task
  description: Creates a new recurring or one-time task. Can be created from scratch or based on a template.
  fields:
    template:
      name: Template (Optional)
      description: The name of a template to use. Fills in other fields if they are not provided.
      required: false
      selector:
        text:
    name:
      name: Name (Optional if template is used)
      description: What should the task be called?
      required: false
      selector:
        text:
    description:
      name: Description (Optional)
      description: Additional info.
      required: false
      selector:
        text:
    area:
      name: Area (Optional)
      description: Which area does the task belong to?
      required: false
      selector:
        area:
    interval:
      name: Interval (Days, Optional)
      description: How often does it need to be done? 0 for one-time tasks. If not set, taken from template or defaults to 7.
      required: false
      selector:
        number:
          min: 0
          max: 365
    complexity:
      name: Points (1-10, Optional)
      description: How many points is it worth?
      required: false
      selector:
        number:
          min: 1
          max: 10
    icon:
      name: Icon (Optional)
      description: An mdi-icon, e.g. mdi:broom
      required: false
      selector:
        icon:
    assignees:
      name: Assignees (Optional)
      description: Who is responsible? (Comma separated user IDs or person.name entities).
      required: false
      selector:
        text:
    override_overdue_days:
      name: Overdue after (Days, Optional)
      description: Overrides the global setting for the number of days after which this task is considered overdue.
      required: false
      selector:
        number:
          min: 0
          max: 9999

set_task_due_by_name:
  name: Set task due
  description: Marks a task as due immediately by its exact name.
  fields:
    task_name:
      name: Task name
      description: The exact name of the task (e.g., "Take out the trash").
      required: true
      example: "Take out the trash"
      selector:
        text:

pause_task_by_name:
  name: Pause task
  description: Pauses a task until a specific date by its exact name.
  fields:
    task_name:
      name: Task name
      description: The exact name of the task (e.g., "Take out the trash").
      required: true
      example: "Take out the trash"
      selector:
        text:
    pause_until:
      name: Pause until
      description: The date until which the task should be paused (e.g., "2024-12-31").
      required: true
      selector:
        date: